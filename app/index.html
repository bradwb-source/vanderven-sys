<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM | Vanderven Systems</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/app/app.css" />
  </head>
  <body>
    <div class="mobile-bar" role="navigation" aria-label="CRM sections">
      <button type="button" data-view="pipeline" class="is-active">Pipeline</button>
      <button type="button" data-view="leads">Leads</button>
      <button type="button" id="mobile-new">New</button>
    </div>

    <div class="app-shell">
      <aside class="app-rail" aria-label="CRM navigation">
        <div class="app-rail__brand">
          <img src="/public/logo-mark-nav.png" alt="" width="40" height="24" />
          <div>
            <strong>Vanderven</strong>
            <span>CRM</span>
          </div>
        </div>
        <nav class="app-nav">
          <button type="button" data-view="pipeline" class="is-active">Pipeline</button>
          <button type="button" data-view="leads">Leads</button>
        </nav>
        <div class="app-rail__foot">
          <a class="btn btn-ghost" href="/">View site</a>
          <button type="button" class="btn btn-ghost" id="sign-out">Sign out</button>
        </div>
      </aside>

      <main class="app-main">
        <header class="app-top">
          <div>
            <h1 id="view-title">Pipeline</h1>
            <p id="view-sub">Move leads through the work.</p>
          </div>
          <div class="app-top__actions">
            <input
              class="search"
              id="search"
              type="search"
              placeholder="Search leads"
              autocomplete="off"
            />
            <button type="button" class="btn btn-primary" id="new-lead">New lead</button>
          </div>
        </header>

        <section id="view-pipeline" aria-label="Pipeline board"></section>
        <section id="view-leads" aria-label="Leads list" hidden></section>
      </main>
    </div>

    <div class="drawer-backdrop" id="drawer-backdrop" hidden></div>
    <aside class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer__head">
        <div>
          <h2 id="drawer-title">Lead</h2>
          <p class="muted" id="drawer-meta" style="margin: 0.25rem 0 0; color: var(--muted); font-size: 0.85rem"></p>
        </div>
        <button type="button" class="btn btn-ghost" id="drawer-close" aria-label="Close">Close</button>
      </div>
      <form class="drawer__body" id="lead-form">
        <input type="hidden" name="id" />
        <div class="field-row">
          <label class="field">
            <span>Name</span>
            <input name="name" required placeholder="Jordan Lee" />
          </label>
          <label class="field">
            <span>Business</span>
            <input name="business" required placeholder="Valley Mechanical Ltd." />
          </label>
        </div>
        <div class="field-row">
          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="you@business.ca" />
          </label>
          <label class="field">
            <span>Phone</span>
            <input name="phone" placeholder="(250) 555-0142" />
          </label>
        </div>
        <div class="field-row">
          <label class="field">
            <span>Industry</span>
            <input name="industry" list="industry-list" placeholder="Real estate" />
            <datalist id="industry-list">
              <option value="Real estate"></option>
              <option value="Property management"></option>
              <option value="Professional services"></option>
              <option value="Trades / HVAC / plumbing / electrical"></option>
              <option value="Lawn care / landscaping / seasonal"></option>
              <option value="Construction / renovation"></option>
            </datalist>
          </label>
          <label class="field">
            <span>Stage</span>
            <select name="stage">
              <option value="new">New</option>
              <option value="audit">Audit</option>
              <option value="quoted">Quoted</option>
              <option value="active">Active</option>
              <option value="won">Won</option>
              <option value="lost">Lost</option>
            </select>
          </label>
        </div>
        <label class="field">
          <span>Notes</span>
          <textarea name="notes" placeholder="What’s going on with this lead…"></textarea>
        </label>
      </form>
      <div class="drawer__foot">
        <button type="button" class="btn btn-danger" id="delete-lead" hidden>Delete</button>
        <div style="display: flex; gap: 0.5rem; margin-left: auto">
          <button type="button" class="btn btn-ghost" id="cancel-lead">Cancel</button>
          <button type="submit" class="btn btn-primary" form="lead-form" id="save-lead">Save</button>
        </div>
      </div>
    </aside>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="/app/app.js"></script>
  </body>
</html>
