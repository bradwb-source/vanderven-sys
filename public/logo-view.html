<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vanderven logo</title>
  <style>
    html, body { margin: 0; min-height: 100%; background: #000; color: #b8953e; font-family: system-ui, sans-serif; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; }
    img { width: min(92vw, 720px); height: auto; display: block; }
    p { margin: 16px 0 0; font-size: 14px; opacity: 0.7; text-align: center; }
  </style>
</head>
<body>
  <main>
    <div>
      <img src="/public/logo-mark-nav.png" alt="Vanderven Systems logo" />
      <p>Gold mark on black (site appearance)</p>
    </div>
  </main>
</body>
</html>
