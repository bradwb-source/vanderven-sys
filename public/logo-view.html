<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Vanderven Systems logo</title>
  <style>
    :root { color-scheme: dark; --gold: #b8953e; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: var(--gold);
    }
    main {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) 24px max(32px, env(safe-area-inset-bottom));
    }
    figure {
      margin: 0;
      width: min(100%, 320px);
      text-align: center;
    }
    figure.wide {
      width: min(100%, 360px);
      margin-top: 48px;
    }
    img {
      width: 100%;
      height: auto;
      display: block;
      image-rendering: auto;
    }
    figcaption {
      margin-top: 14px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.65;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <main>
    <div>
      <figure>
        <img
          src="https://raw.githubusercontent.com/bradwb-source/vanderven-sys/cursor/crm-test-portion-fef7/public/logo-mark-preview-2x.png"
          width="960"
          height="571"
          alt="Vanderven Systems mark"
          decoding="async"
        />
        <figcaption>Brand mark</figcaption>
      </figure>
      <figure class="wide">
        <img
          src="https://raw.githubusercontent.com/bradwb-source/vanderven-sys/cursor/crm-test-portion-fef7/public/logo-lockup-preview.png"
          width="720"
          height="432"
          alt="Vanderven Systems lockup"
          decoding="async"
        />
        <figcaption>Full lockup</figcaption>
      </figure>
    </div>
  </main>
</body>
</html>
